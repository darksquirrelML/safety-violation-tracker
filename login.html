<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#FF6B35"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Login</title>
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #FF6B35 0%, #E53935 100%); padding: 24px; }
    .logo { font-size: 64px; margin-bottom: 12px; }
    .app-title { font-size: 22px; font-weight: 800; color: white; margin-bottom: 4px; text-align: center; }
    .app-sub { font-size: 13px; color: rgba(255,255,255,0.8); margin-bottom: 32px; text-align: center; }
    .card { background: white; border-radius: 16px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    /* Tabs */
    .tabs { display: flex; background: #F5F5F5; border-radius: 8px; padding: 4px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; border-radius: 6px; color: #757575; border: none; background: none; transition: all 0.2s; }
    .tab.active { background: white; color: #FF6B35; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    /* Form */
    label { display: block; font-size: 12px; font-weight: 600; color: #757575; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; padding: 12px; border: 1.5px solid #E0E0E0; border-radius: 8px; font-size: 14px; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #FF6B35; }
    .btn { width: 100%; padding: 13px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: #FF6B35; color: white; }
    .btn-primary:active { background: #E55A26; }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
    /* Messages */
    .error { color: #E53935; font-size: 13px; margin-bottom: 12px; text-align: center; padding: 8px; background: #FFEBEE; border-radius: 6px; }
    .success { color: #2E7D32; font-size: 13px; margin-bottom: 12px; text-align: center; padding: 8px; background: #E8F5E9; border-radius: 6px; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Lang */
    .lang-row { text-align: center; margin-top: 16px; }
    .lang-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; }
    .divider { border: none; border-top: 1px solid #E0E0E0; margin: 12px 0; }
    .note { font-size: 11px; color: #9E9E9E; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
<div class="logo">🦺</div>
<div class="app-title" id="app-title">Safety Violation Tracker</div>
<div class="app-sub" id="app-sub">Construction Safety Management</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div id="msg"></div>

  <!-- Login Form -->
  <div id="login-form">
    <label id="lbl-email">Email</label>
    <input type="email" id="login-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"/>
    <label id="lbl-password">Password</label>
    <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
      <span id="login-btn-text">Login</span>
    </button>
  </div>

  <!-- Register Form -->
  <div id="register-form" style="display:none">
    <label id="lbl-reg-email">Email</label>
    <input type="email" id="reg-email" placeholder="your@email.com"/>
    <label id="lbl-reg-password">Password</label>
    <input type="password" id="reg-password" placeholder="Min 6 characters"/>
    <label id="lbl-reg-confirm">Confirm Password</label>
    <input type="password" id="reg-confirm" placeholder="Repeat password"/>
    <button class="btn btn-primary" id="register-btn" onclick="doRegister()">
      <span id="register-btn-text">Create Account</span>
    </button>
    <p class="note" id="reg-note">You will receive a verification email. Please verify before logging in.</p>
  </div>
</div>

<div class="lang-row">
  <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">中文</button>
</div>

<script>
// Get app name from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const APP_NAME = urlParams.get('app') || 'safety-violation';

// Translations
const LABELS = {
  en: {
    login: 'Login', register: 'Register', email: 'Email', password: 'Password',
    confirm: 'Confirm Password', createAccount: 'Create Account',
    loginBtn: 'Login', loggingIn: 'Logging in...', registering: 'Creating account...',
    note: 'You will receive a verification email. Please verify before logging in.',
    errorEmpty: 'Please fill in all fields',
    errorMatch: 'Passwords do not match',
    errorShort: 'Password must be at least 6 characters',
    errorLogin: 'Invalid email or password',
    errorVerify: 'Please verify your email first. Check your inbox.',
    errorAccess: 'Account not found. Please register first.',
    successRegister: '✅ Account created! Please check your email to verify.',
    successLogin: '✅ Login successful!',
  },
  zh: {
    login: '登录', register: '注册', email: '电子邮件', password: '密码',
    confirm: '确认密码', createAccount: '创建账户',
    loginBtn: '登录', loggingIn: '登录中...', registering: '创建账户中...',
    note: '您将收到一封验证邮件，请验证后再登录。',
    errorEmpty: '请填写所有字段',
    errorMatch: '两次密码不一致',
    errorShort: '密码至少需要6个字符',
    errorLogin: '邮箱或密码错误',
    errorVerify: '请先验证您的邮箱，查看收件箱。',
    errorAccess: '未找到账户，请先注册。',
    successRegister: '✅ 账户已创建！请查看邮件进行验证。',
    successLogin: '✅ 登录成功！',
  }
};

let lang = localStorage.getItem('svt_lang') || 'en';

function L(key) { return LABELS[lang][key] || key; }

function updateLabels() {
  document.getElementById('tab-login').textContent = L('login');
  document.getElementById('tab-register').textContent = L('register');
  document.getElementById('lbl-email').textContent = L('email');
  document.getElementById('lbl-password').textContent = L('password');
  document.getElementById('lbl-reg-email').textContent = L('email');
  document.getElementById('lbl-reg-password').textContent = L('password');
  document.getElementById('lbl-reg-confirm').textContent = L('confirm');
  document.getElementById('login-btn-text').textContent = L('loginBtn');
  document.getElementById('register-btn-text').textContent = L('createAccount');
  document.getElementById('reg-note').textContent = L('note');
  document.getElementById('lang-toggle').textContent = lang === 'en' ? '中文' : 'EN';
  document.getElementById('app-title').textContent = lang === 'en' ? 'Safety Violation Tracker' : '安全违规追踪系统';
  document.getElementById('app-sub').textContent = lang === 'en' ? 'Construction Safety Management' : '建筑安全管理';
  document.getElementById('login-email').placeholder = 'your@email.com';
  document.getElementById('reg-email').placeholder = 'your@email.com';
  document.getElementById('login-password').placeholder = '••••••••';
  document.getElementById('reg-password').placeholder = lang === 'en' ? 'Min 6 characters' : '至少6个字符';
  document.getElementById('reg-confirm').placeholder = lang === 'en' ? 'Repeat password' : '重复密码';
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('svt_lang', lang);
  updateLabels();
  document.getElementById('msg').innerHTML = '';
}

function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('msg').innerHTML = '';
}

function showMsg(text, type) {
  document.getElementById('msg').innerHTML = `<div class="${type}">${text}</div>`;
}

function setLoading(btnId, textId, loading, text) {
  const btn = document.getElementById(btnId);
  const span = document.getElementById(textId);
  btn.disabled = loading;
  span.innerHTML = loading ? `<span class="spinner"></span>` : text;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg(L('errorEmpty'), 'error'); return; }

  setLoading('login-btn', 'login-btn-text', true);
  try {
    const data = await supabaseSignIn(email, password);

    // Check if email is verified
    if (data.user && !data.user.email_confirmed_at) {
      showMsg(L('errorVerify'), 'error');
      setLoading('login-btn', 'login-btn-text', false, L('loginBtn'));
      return;
    }

    // Check/register app user
    const isRegistered = await checkAppUser(email, APP_NAME, data.access_token);
    if (!isRegistered) {
      // Auto register for this app
      await registerAppUser(email, APP_NAME, data.access_token);
    }

    // Save session
    saveSession(data);
    localStorage.setItem('svt_lang', lang);
    showMsg(L('successLogin'), 'success');

    // Redirect to app
    setTimeout(() => { window.location.href = 'index.html'; }, 800);

  } catch (e) {
    console.error(e);
    showMsg(L('errorLogin'), 'error');
    setLoading('login-btn', 'login-btn-text', false, L('loginBtn'));
  }
}

async function doRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;

  if (!email || !password || !confirm) { showMsg(L('errorEmpty'), 'error'); return; }
  if (password !== confirm) { showMsg(L('errorMatch'), 'error'); return; }
  if (password.length < 6) { showMsg(L('errorShort'), 'error'); return; }

  setLoading('register-btn', 'register-btn-text', true);
  try {
    await supabaseSignUp(email, password);
    showMsg(L('successRegister'), 'success');
    setLoading('register-btn', 'register-btn-text', false, L('createAccount'));
    // Switch to login tab after 2 seconds
    setTimeout(() => { switchTab('login'); }, 2000);
  } catch (e) {
    console.error(e);
    showMsg(e.message || L('errorEmpty'), 'error');
    setLoading('register-btn', 'register-btn-text', false, L('createAccount'));
  }
}

// Check if already logged in
const existingUser = getCurrentUser();
if (existingUser) {
  window.location.href = 'index.html';
}

// Init labels
updateLabels();
</script>
</body>
</html>
