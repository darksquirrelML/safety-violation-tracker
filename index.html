// ============================================================
// SUPABASE CLIENT (vanilla fetch)
// ============================================================
async function supaFetch(path, options = {}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation',
  };
  if (options.headers) {
    Object.assign(headers, options.headers);
  }
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: headers,
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function uploadPhoto(file, path) {
  const compressed = await compressImage(file);
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'image/jpeg',
      'x-upsert': 'true'
    },
    body: compressed
  });
  if (!res.ok) throw new Error('Upload failed');
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

async function deletePhoto(path) {
  await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'DELETE',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    }
  });
}

// ============================================================
// IMAGE COMPRESSION
// ============================================================
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        const maxDim = 1200;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = height * maxDim / width; width = maxDim; }
          else { width = width * maxDim / height; height = maxDim; }
        }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(resolve, 'image/jpeg', 0.75);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function submitReport() {
  const f = state.form;
  if (!f.project || !f.reportedBy || !f.violationType || !f.severity || !f.location) {
    showToast('⚠️ Please fill all required fields');
    return;
  }
  if (!f.beforePhoto) { showToast('⚠️ Before photo is required'); return; }

  state.submitLoading = true; render();

  try {
    const ts = Date.now();
    const beforePath = `${f.project}/before/${ts}_before.jpg`;
    const beforeUrl = await uploadPhoto(f.beforePhoto, beforePath);

    let afterUrl = null;
    if (f.afterPhoto) {
      const afterPath = `${f.project}/after/${ts}_after.jpg`;
      afterUrl = await uploadPhoto(f.afterPhoto, afterPath);
    }

    const violationType = f.violationType === 'Others' ? `Others: ${f.othersDetail}` : f.violationType;

    await supaFetch('violations', {
      method: 'POST',
      body: JSON.stringify({
        project: f.project,
        reported_by: f.reportedBy,
        date: f.date,
        violation_type: violationType,
        severity: f.severity,
        location: f.location,
        description: f.description,
        action_taken: f.actionTaken,
        before_photo_url: beforeUrl,
        after_photo_url: afterUrl,
        status: afterUrl ? 'Closed' : 'Open',
        before_photo_path: beforePath,
      })
    });

    showToast(t('reportSuccess'));
    state.form = {
      project: '', reportedBy: '', date: new Date().toISOString().split('T')[0],
      violationType: '', othersDetail: '', severity: '', location: '',
      description: '', actionTaken: '', status: 'Open',
      beforePhoto: null, afterPhoto: null, beforePreview: null, afterPreview: null
    };
    state.tab = 'violations';
    await loadViolations();
  } catch(e) {
    console.error(e);
    showToast(t('reportError'));
  }
  state.submitLoading = false; render();
}

async function updateViolationStatus(id, newStatus) {
  try {
    await supaFetch(`violations?id=eq.${id}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus })
    });
    await loadViolations();
    state.selectedViolation = state.violations.find(v => v.id === id);
    render();
  } catch(e) { showToast('❌ Update failed'); }
}

async function uploadAfterPhotoToViolation(violation, file) {
  state.loading = true; render();
  try {
    const ts = Date.now();
    const afterPath = `${violation.project}/after/${ts}_after.jpg`;
    const afterUrl = await uploadPhoto(file, afterPath);
    await supaFetch(`violations?id=eq.${violation.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ after_photo_url: afterUrl, after_photo_path: afterPath, status: 'Closed' })
    });
    showToast('✅ After photo uploaded!');
    await loadViolations();
    state.selectedViolation = state.violations.find(v => v.id === violation.id);
  } catch(e) { showToast('❌ Upload failed'); }
  state.loading = false; render();
}

async function deleteAfterPhoto(violation) {
  if (state.adminPw !== ADMIN_PASSWORD) { showToast('❌ Wrong admin password'); return; }
  state.loading = true; render();
  try {
    if (violation.after_photo_path) await deletePhoto(violation.after_photo_path);
    await supaFetch(`violations?id=eq.${violation.id}`, {
      method: 'PATCH',
      body: JSON.stringify({ after_photo_url: null, after_photo_path: null, status: 'Open' })
    });
    showToast('✅ Photo deleted');
    state.deleteConfirm = false;
    state.adminPw = '';
    await loadViolations();
    state.selectedViolation = state.violations.find(v => v.id === violation.id);
  } catch(e) { showToast('❌ Delete failed'); }
  state.loading = false; render();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg) {
  state.toast = msg;
  render();
  setTimeout(() => { state.toast = null; render(); }, 3000);
}

// ============================================================
// PHOTO HANDLING
// ============================================================
function handlePhotoSelect(field, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    state.form[field] = file;
    state.form[field.replace('Photo', 'Preview')] = e.target.result;
    render();
  };
  reader.readAsDataURL(file);
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (!state.loggedIn) { app.innerHTML = renderLogin(); return; }
  if (state.selectedViolation) { app.innerHTML = renderDetail(); attachDetailEvents(); return; }
  app.innerHTML = `
    ${renderHeader()}
    ${renderNav()}
    <div class="content">
      ${state.tab === 'dashboard' ? renderDashboard() : ''}
      ${state.tab === 'report' ? renderReportForm() : ''}
      ${state.tab === 'violations' ? renderViolationsList() : ''}
      ${state.tab === 'projects' ? renderProjects() : ''}
    </div>
    ${state.toast ? `<div class="toast">${state.toast}</div>` : ''}
  `;
  attachEvents();
}

function renderHeader() {
  return `

          <h1>🦺 ${t('appTitle')}</h1>

        </div>

  return `
    <div class="stats-row">
      <div class="stat-card">

      </div>

// ============================================================
// BADGES
// ============================================================
function statusBadge(status) {
  const map = { 'Open': 'badge-open', 'In Progress': 'badge-progress', 'Closed': 'badge-closed' };
  const labels = { 'Open': t('open'), 'In Progress': t('inProgress'), 'Closed': t('closed') };
  return `<span class="badge ${map[status] || 'badge-open'}">${labels[status] || status}</span>`;
}
function severityBadge(sev) {
  const map = { 'Low': 'badge-low', 'Medium': 'badge-medium', 'High': 'badge-high', 'Critical': 'badge-critical' };
  const labels = { 'Low': t('low'), 'Medium': t('medium'), 'High': t('high'), 'Critical': t('critical') };
  return `<span class="badge ${map[sev] || 'badge-medium'}">${labels[sev] || sev}</span>`;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function attachEvents() {
  // Form field sync
  const fields = ['project','reportedBy','date','violationType','othersDetail','severity','location','description'];
  fields.forEach(field => {
    const el = document.getElementById(`f-${field}`);
    if (el) el.addEventListener('change', () => { state.form[field] = el.value; render(); });
  });
  // New project input
  const np = document.getElementById('new-project-input');
  if (np) np.addEventListener('input', () => { state.newProjectName = np.value; });
}

function attachDetailEvents() {
  const pw = document.getElementById('admin-pw');
  if (pw) pw.addEventListener('input', () => { state.adminPw = pw.value; });
}

function handlePhoto(type, input) {
  if (input.files[0]) handlePhotoSelect(type + 'Photo', input.files[0]);
}

function handleDetailAfterPhoto(input) {
  if (input.files[0]) uploadAfterPhotoToViolation(state.selectedViolation, input.files[0]);
}

function doDeleteAfterPhoto() {
  state.adminPw = document.getElementById('admin-pw')?.value || state.adminPw;
  deleteAfterPhoto(state.selectedViolation);
}

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === APP_PASSWORD) {
    state.loggedIn = true;
    render();
    loadViolations();
  } else {
    document.getElementById('pw-error').textContent = t('wrongPassword');
  }
}

function toggleLang() {
  state.lang = state.lang === 'en' ? 'zh' : 'en';
  render();
}

function setTab(tab) {
  state.tab = tab;
  if (tab === 'violations' || tab === 'dashboard') loadViolations();
  else render();
}

function setFilter(f) { state.filter = f; render(); }

function selectViolation(id) {
  state.selectedViolation = state.violations.find(v => v.id === id);
  render();
}

function addProject() {
  const name = document.getElementById('new-project-input')?.value || state.newProjectName;
  if (name.trim()) {
    state.projects.push(name.trim());
    state.newProjectName = '';
    state.showAddProject = false;
    render();
  }
}

// ============================================================
// INIT
// ============================================================
render();
</script>
