// Violation types with English keys and translated display
const VIOLATION_TYPES_EN = [
  'PPE Not Worn','Working at Height','Scaffolding Unsafe','Electrical Hazard','Fire Hazard',
  'Housekeeping','Machinery Unsafe','No Signage','Excavation Unsafe','Chemical Hazard',
  'Blocked Emergency Exit','Overloaded Platform','Others'

  '未佩戴PPE','高处作业','脚手架不安全','电气危险','火灾隐患','环境卫生',
  '机械不安全','无标识','挖掘不安全','化学危险','紧急出口堵塞','平台超载','其他'
];

// Translate violation type for display
function translateViolationType(englishType) {
  if (state.lang === 'en') return englishType;
  // Handle "Others: xyz" case
  if (englishType && englishType.startsWith('Others:')) return englishType;
  const idx = VIOLATION_TYPES_EN.indexOf(englishType);
  return idx !== -1 ? VIOLATION_TYPES_ZH[idx] : englishType;
}

// Translate severity
function translateSeverity(s) {
  const map = { Low: t('low'), Medium: t('medium'), High: t('high'), Critical: t('critical') };
  return map[s] || s;
}

// Translate status
function translateStatus(s) {
  const map = { Open: t('open'), 'In Progress': t('inProgress'), Closed: t('closed') };
  return map[s] || s;
}

  tab: 'dashboard',
  violations: [],
  projects: JSON.parse(localStorage.getItem('svt_projects') || '["P202","P209","P210","P211","P212","P213","P216"]'),

  editingProject: null, editingProjectName: '', deleteProjectConfirm: false, deleteProjectName: '',
  lastSeenTime: parseInt(localStorage.getItem('svt_lastSeenTime') || '0'),
};

function t(k) { return T[state.lang][k] || k; }

function saveAppState() {
  localStorage.setItem('svt_lang', state.lang);
  localStorage.setItem('svt_projects', JSON.stringify(state.projects));
  localStorage.setItem('svt_lastProject', state.projectFilter || 'all');
}

function getNewViolations(project=null) {
  return state.violations.filter(v => {
    const isNew = new Date(v.created_at).getTime() > state.lastSeenTime;
    return project ? isNew && v.project === project : isNew;
  });
}

function markAllSeen() {
  state.lastSeenTime = Date.now();
  localStorage.setItem('svt_lastSeenTime', state.lastSeenTime);
  updateBadge(0);
  render();
}

function updateBadge(count) {
  if ('setAppBadge' in navigator) {
    if (count > 0) navigator.setAppBadge(count).catch(() => {});
    else navigator.clearAppBadge().catch(() => {});
  }
}

// ============================================================
// SUPABASE
// ============================================================
async function supaFetch(path, options={}) {
  const token = getAuthToken() || SUPABASE_KEY;
  const headers = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
  if (options.headers) Object.assign(headers, options.headers);
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { ...options, headers });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function uploadPhoto(file, path) {
  const compressed = await compressImage(file);
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'POST', body: compressed,
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'image/jpeg', 'x-upsert': 'true' }
  });
  if (!res.ok) throw new Error('Upload failed');
  return `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;
}

async function deleteStoragePhoto(path) {
  await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'DELETE', headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
  });
}

function compressImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img, max = 1200;
        if (width > max || height > max) { if (width > height) { height = height * max / width; width = max; } else { width = width * max / height; height = max; } }
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(resolve, 'image/jpeg', 0.75);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function submitReport() {
  const f = state.form;
  if (!f.project || !f.reportedBy || !f.violationType || !f.severity || !f.location) { showToast('⚠️ ' + (state.lang==='zh'?'请填写所有必填项':'Please fill all required fields')); return; }

  if (!f.beforePhoto) { showToast('⚠️ ' + (state.lang==='zh'?'请上传事前照片':'Before photo is required')); return; }
  state.submitLoading = true; render();
  try {
    const ts = Date.now();
    const beforePath = `${f.project}/before/${ts}_before.jpg`;
    const beforeUrl = await uploadPhoto(f.beforePhoto, beforePath);
    let afterUrl = null, afterPath = null;
    if (f.afterPhoto) { afterPath = `${f.project}/after/${ts}_after.jpg`; afterUrl = await uploadPhoto(f.afterPhoto, afterPath); }

function loadImageAsBase64(url) {
  return new Promise((resolve, reject) => {
    const img = new Image(); img.crossOrigin = 'Anonymous';
    img.onload = () => { const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; c.getContext('2d').drawImage(img, 0, 0); resolve(c.toDataURL('image/jpeg', 0.8)); };
    img.onerror = reject; img.src = url;
  });
}

async function generatePDF(project) {
  state.pdfGenerating = true; render();
  try {
    const { jsPDF } = window.jspdf;
    const filtered = project === 'all' ? state.violations : state.violations.filter(v => v.project === project);
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const margin = 15, contentW = 210 - margin * 2;
    let y = margin;
    function checkPage(need=20) { if (y + need > 280) { doc.addPage(); y = margin; } }
    doc.setFillColor(255, 107, 53); doc.rect(0, 0, 210, 28, 'F');
    doc.setTextColor(255, 255, 255); doc.setFontSize(16); doc.setFont('helvetica', 'bold');
    doc.text('Safety Violation Report', margin, 12);
    doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    const dateStr = new Date().toLocaleDateString('en-GB');
    doc.text(`Generated: ${dateStr}  |  Project: ${project === 'all' ? 'All Projects' : project}  |  Total: ${filtered.length}`, margin, 21);
    y = 36;
    const open = filtered.filter(v => v.status === 'Open').length;
    const closed = filtered.filter(v => v.status === 'Closed').length;
    const inProg = filtered.filter(v => v.status === 'In Progress').length;
    const pct = filtered.length ? Math.round(closed / filtered.length * 100) : 0;
    doc.setFillColor(245, 245, 245); doc.rect(margin, y, contentW, 16, 'F');
    doc.setTextColor(33, 33, 33); doc.setFontSize(10); doc.setFont('helvetica', 'bold');
    doc.text(`Total: ${filtered.length}   Open: ${open}   In Progress: ${inProg}   Closed: ${closed}   Completion: ${pct}%`, margin + 4, y + 10);
    y += 22;
    for (let i = 0; i < filtered.length; i++) {
      const v = filtered[i];
      checkPage(70);
      doc.setFillColor(255, 240, 230); doc.rect(margin, y, contentW, 9, 'F');
      doc.setTextColor(229, 90, 38); doc.setFontSize(11); doc.setFont('helvetica', 'bold');
      doc.text(`#${i + 1}  ${v.project}  —  ${v.violation_type}`, margin + 3, y + 6.5);
      y += 12;
      doc.setTextColor(33, 33, 33); doc.setFontSize(9);
      const rows = [['Date', v.date, 'Reported By', v.reported_by], ['Severity', v.severity, 'Status', v.status], ['Location', v.location, 'Action Taken', v.action_taken || '-']];
      rows.forEach(row => {
        checkPage(7);
        doc.setFont('helvetica', 'bold'); doc.text(row[0] + ':', margin, y);
        doc.setFont('helvetica', 'normal'); doc.text(String(row[1] || '-'), margin + 25, y);
        doc.setFont('helvetica', 'bold'); doc.text(row[2] + ':', margin + 95, y);
        doc.setFont('helvetica', 'normal'); doc.text(String(row[3] || '-'), margin + 122, y);
        y += 6;
      });
      if (v.description) {
        checkPage(8); doc.setFont('helvetica', 'bold'); doc.text('Description:', margin, y);
        doc.setFont('helvetica', 'normal');
        const lines = doc.splitTextToSize(v.description, contentW - 28);
        doc.text(lines, margin + 28, y); y += lines.length * 5 + 2;
      }
      checkPage(60);
      const photoY = y; let added = false;
      doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(100, 100, 100);
      if (v.before_photo_url) {
        try { const b64 = await loadImageAsBase64(v.before_photo_url); doc.text('BEFORE PHOTO', margin, photoY); doc.addImage(b64, 'JPEG', margin, photoY + 2, 85, 55); added = true; }
        catch (e) { doc.text('BEFORE: unavailable', margin, photoY + 5); }
      }
      if (v.after_photo_url) {
        try { const b64 = await loadImageAsBase64(v.after_photo_url); doc.text('AFTER PHOTO', margin + 95, photoY); doc.addImage(b64, 'JPEG', margin + 95, photoY + 2, 85, 55); added = true; }
        catch (e) { doc.text('AFTER: unavailable', margin + 95, photoY + 5); }
      }
      if (added) y = photoY + 62; else y += 5;
      doc.setDrawColor(220, 220, 220); doc.setTextColor(33, 33, 33);
      doc.line(margin, y, margin + contentW, y); y += 6;
    }
    const total = doc.getNumberOfPages();
    for (let p = 1; p <= total; p++) { doc.setPage(p); doc.setFontSize(8); doc.setTextColor(150, 150, 150); doc.text(`Page ${p} of ${total}  |  Safety Violation Tracker`, margin, 290); }
    doc.save(`Safety_Violations_${project === 'all' ? 'All' : project}_${dateStr.replace(/\//g, '-')}.pdf`);
    showToast('✅ PDF downloaded!');
  } catch (e) { console.error(e); showToast('❌ PDF failed. Try again.'); }
  state.pdfGenerating = false; render();
}

      <button class="filter-chip ${state.filter === 'open' ? 'active' : ''}" onclick="setFilter('open')">${t('filterOpen')} (${projectViolations.filter(v => v.status === 'Open').length})</button>
      <button class="filter-chip ${state.filter === 'progress' ? 'active' : ''}" onclick="setFilter('progress')">${t('filterProgress')} (${projectViolations.filter(v => v.status === 'In Progress').length})</button>
      <button class="filter-chip ${state.filter === 'closed' ? 'active' : ''}" onclick="setFilter('closed')">${t('filterClosed')} (${projectViolations.filter(v => v.status === 'Closed').length})</button>
    </div>
    ${state.loading ? `<div class="loading"><div class="spinner"></div><span>Loading...</span></div>` : ''}
    ${!state.loading && filtered.length === 0 ? `<div class="empty-state"><div class="empty-icon">✅</div><p>${t('noViolations')}</p></div>` : ''}
    ${filtered.map(v => {
      const isNew = new Date(v.created_at).getTime() > state.lastSeenTime;
      const displayType = translateViolationType(v.violation_type);
      return `<div class="violation-item ${v.status === 'Closed' ? 'closed' : v.status === 'In Progress' ? 'in-progress' : 'open'}" onclick="selectViolation(${v.id})" style="${isNew ? 'box-shadow:0 0 0 2px var(--danger);' : ''}">
        <div class="violation-header">
          <div class="violation-title">${v.project} — ${displayType} ${isNew ? '<span style="font-size:10px;background:var(--danger);color:white;padding:1px 6px;border-radius:10px;font-weight:700">NEW</span>' : ''}</div>
          ${severityBadge(v.severity)}
        </div>
        <div class="violation-meta">${v.date} · ${v.reported_by} · ${v.location}</div>
        <div style="margin-top:6px">${statusBadge(v.status)}<span style="font-size:11px;color:var(--text2);margin-left:8px">${v.before_photo_url ? '📷' : ''}${v.after_photo_url ? ' ✅' : ''}</span></div>
      </div>`;
    }).join('')}
  `;
}

function renderProjects() {
  return `<div class="card"><div class="card-title">🏗️ ${t('projects')}</div>
    ${state.projects.map(p => {
      const pvs = state.violations.filter(v => v.project === p);
      const closed = pvs.filter(v => v.status === 'Closed').length;
      const isEditing = state.editingProject === p;
      if (isEditing) {
        return `<div class="project-list-item" style="flex-direction:column;align-items:stretch">
          <input type="text" id="edit-project-input" value="${state.editingProjectName}" style="margin-bottom:8px"/>
          <label style="margin-bottom:4px">${t('adminPassword')}</label>
          <input type="password" id="edit-project-pw" placeholder="Admin password" value="${state.adminPw}" style="margin-bottom:8px"/>
          <div class="btn-row">
            <button class="btn btn-primary btn-sm" onclick="doSaveEditProject()">${t('saveChanges')}</button>
            <button class="btn btn-outline btn-sm" onclick="state.editingProject=null;state.adminPw='';render()">${t('cancel')}</button>
          </div>
        </div>`;
      }
      if (state.deleteProjectConfirm && state.deleteProjectName === p) {
        return `<div class="project-list-item" style="flex-direction:column;align-items:stretch">
          <div class="danger-box">
            <div style="font-size:13px;font-weight:600;color:var(--danger);margin-bottom:8px">⚠️ ${t('deleteProjectConfirm')}</div>
            <label>${t('adminPassword')}</label>
            <input type="password" id="delete-project-pw" placeholder="Admin password" value="${state.adminPw}" style="margin-bottom:8px"/>
            <div class="btn-row">
              <button class="btn btn-danger btn-sm" onclick="doConfirmDeleteProject()">${t('confirmDelete')}</button>
              <button class="btn btn-outline btn-sm" onclick="state.deleteProjectConfirm=false;state.adminPw='';render()">${t('cancel')}</button>
            </div>
          </div>
        </div>`;
      }
      return `<div class="project-list-item">
        <div>
          <div class="project-list-name">${p}</div>
          <div class="project-list-count">${pvs.length} ${state.lang==='zh'?'违规':'violations'} · ${closed} ${state.lang==='zh'?'已解决':'closed'}</div>
        </div>
        <div class="project-list-actions">
          <button class="btn btn-outline btn-sm" onclick="startEditProject('${p}')">✏️</button>
          <button class="btn btn-outline-danger btn-sm" onclick="startDeleteProject('${p}')">🗑</button>
        </div>
      </div>`;
    }).join('')}
    ${state.showAddProject ? `
      <div style="margin-top:12px">
        <input type="text" id="new-project-input" value="${state.newProjectName}" placeholder="${t('newProjectName')}" style="margin-bottom:8px"/>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="addProject()">${t('add')}</button>
          <button class="btn btn-outline btn-sm" onclick="state.showAddProject=false;render()">${t('cancel')}</button>
        </div>
      </div>
    ` : `<button class="btn btn-outline" style="margin-top:12px" onclick="state.showAddProject=true;render()">${t('addProject')}</button>`}
  </div>`;
}

function renderDetail() {
  const v = state.selectedViolation; if (!v) return '';
  if (state.editMode) return renderEditForm();
  const displayType = translateViolationType(v.violation_type);
  return `${renderHeader()}<div class="content">
    <div class="detail-header"><button class="back-btn" onclick="state.selectedViolation=null;state.editMode=false;state.deleteViolationConfirm=false;state.deleteConfirm=false;state.adminPw='';render()">←</button><div><div style="font-size:15px;font-weight:700">${v.project} — ${displayType}</div><div style="font-size:12px;color:var(--text2)">${v.date} · ${v.reported_by}</div></div></div>
    <div class="card"><div style="margin-bottom:10px">${statusBadge(v.status)}${severityBadge(v.severity)}</div>
      <div class="info-row"><span class="info-label">${t('projectName')}</span><span class="info-value">${v.project}</span></div>
      <div class="info-row"><span class="info-label">${t('reportedBy')}</span><span class="info-value">${v.reported_by}</span></div>
      <div class="info-row"><span class="info-label">${t('date')}</span><span class="info-value">${v.date}</span></div>
      <div class="info-row"><span class="info-label">${t('violationType')}</span><span class="info-value">${displayType}</span></div>
      <div class="info-row"><span class="info-label">${t('locationOnSite')}</span><span class="info-value">${v.location}</span></div>
      ${v.description ? `<div class="info-row"><span class="info-label">${t('description')}</span><span class="info-value">${v.description}</span></div>` : ''}
      ${v.action_taken ? `<div class="info-row"><span class="info-label">${t('actionTaken')}</span><span class="info-value">${v.action_taken}</span></div>` : ''}
    </div>
    <div class="card"><div class="card-title">📷 ${state.lang==='zh'?'照片':'Photos'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div><div style="font-size:11px;font-weight:700;margin-bottom:4px;color:var(--text2)">BEFORE</div>${v.before_photo_url ? `<img src="${v.before_photo_url}" style="width:100%;border-radius:8px;aspect-ratio:1;object-fit:cover"/>` : `<div style="background:#EEE;border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:24px">📷</div>`}</div>
        <div><div style="font-size:11px;font-weight:700;margin-bottom:4px;color:var(--text2)">AFTER</div>${v.after_photo_url ? `<img src="${v.after_photo_url}" style="width:100%;border-radius:8px;aspect-ratio:1;object-fit:cover"/>` : `<div style="background:#EEE;border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:24px">📷</div>`}</div>
      </div>
      ${!v.after_photo_url ? `<div><div style="font-size:12px;color:var(--text2);margin-bottom:8px">${state.lang==='zh'?'上传事后照片:':'Upload After Photo:'}</div><div class="btn-row"><button class="btn btn-outline btn-sm" onclick="document.getElementById('dac').click()">📷 ${t('takePhoto')}</button><button class="btn btn-outline btn-sm" onclick="document.getElementById('daf').click()">📁 ${t('uploadPhoto')}</button></div><input type="file" id="dac" accept="image/*" capture="environment" onchange="handleDetailAfterPhoto(this)"/><input type="file" id="daf" accept="image/*" onchange="handleDetailAfterPhoto(this)"/></div>` : `<div style="margin-top:8px">${!state.deleteConfirm ? `<button class="btn btn-outline-danger btn-sm" onclick="state.deleteConfirm=true;render()">${t('deletePhoto')}</button>` : `<label>${t('adminPassword')}</label><input type="password" id="admin-pw" placeholder="Admin password" style="margin-bottom:8px" value="${state.adminPw}"/><div class="btn-row"><button class="btn btn-danger btn-sm" onclick="doDeleteAfterPhoto()">${t('confirmDelete')}</button><button class="btn btn-outline btn-sm" onclick="state.deleteConfirm=false;state.adminPw='';render()">${t('cancel')}</button></div>`}</div>`}
    </div>
    <div class="card"><div class="card-title">🔄 ${t('updateStatus')}</div>
      <div class="btn-row" style="flex-wrap:wrap">
        <button class="btn btn-sm ${v.status === 'Open' ? 'btn-primary' : 'btn-outline'}" onclick="updateViolationStatus(${v.id},'Open')">${t('open')}</button>
        <button class="btn btn-sm ${v.status === 'In Progress' ? 'btn-primary' : 'btn-outline'}" onclick="updateViolationStatus(${v.id},'In Progress')">${t('inProgress')}</button>
        <button class="btn btn-success btn-sm" onclick="updateViolationStatus(${v.id},'Closed')">${t('closed')}</button>
      </div>
    </div>
    <div class="card"><div class="card-title">⚙️ ${t('adminSection')}</div>
      <button class="btn btn-warning" onclick="startEdit()">${t('editViolation')}</button>
      ${!state.deleteViolationConfirm ? `<button class="btn btn-outline-danger" onclick="state.deleteViolationConfirm=true;render()">${t('deleteViolation')}</button>` : `<div class="danger-box"><div style="font-size:13px;font-weight:600;color:var(--danger);margin-bottom:8px">⚠️ ${t('deleteViolationConfirm')}</div><label>${t('adminPassword')}</label><input type="password" id="admin-pw-del" placeholder="Admin password" style="margin-bottom:8px" value="${state.adminPw}"/><div class="btn-row"><button class="btn btn-danger btn-sm" onclick="doDeleteViolation()">${t('confirmDelete')}</button><button class="btn btn-outline btn-sm" onclick="state.deleteViolationConfirm=false;state.adminPw='';render()">${t('cancel')}</button></div></div>`}
    </div>
  </div>${state.toast ? `<div class="toast">${state.toast}</div>` : ''}`;
}

function renderEditForm() {
  const ef = state.editForm;
  return `${renderHeader()}<div class="content">
    <div class="detail-header"><button class="back-btn" onclick="state.editMode=false;state.adminPw='';render()">←</button><div style="font-size:16px;font-weight:700">${t('editViolation')}</div></div>
    <div class="card">
      <label>${t('projectName')}</label><select id="ef-project">${state.projects.map(p => `<option value="${p}" ${ef.project === p ? 'selected' : ''}>${p}</option>`).join('')}</select>
      <label>${t('reportedBy')}</label><input type="text" id="ef-reported_by" value="${ef.reported_by || ''}"/>
      <label>${t('date')}</label><input type="date" id="ef-date" value="${ef.date || ''}"/>
      <label>${t('violationType')}</label><input type="text" id="ef-violation_type" value="${ef.violation_type || ''}" placeholder="Violation type"/>
      <label>${t('severity')}</label><select id="ef-severity"><option value="Low" ${ef.severity === 'Low' ? 'selected' : ''}>${t('low')}</option><option value="Medium" ${ef.severity === 'Medium' ? 'selected' : ''}>${t('medium')}</option><option value="High" ${ef.severity === 'High' ? 'selected' : ''}>${t('high')}</option><option value="Critical" ${ef.severity === 'Critical' ? 'selected' : ''}>${t('critical')}</option></select>
      <label>${t('status')}</label><select id="ef-status"><option value="Open" ${ef.status === 'Open' ? 'selected' : ''}>${t('open')}</option><option value="In Progress" ${ef.status === 'In Progress' ? 'selected' : ''}>${t('inProgress')}</option><option value="Closed" ${ef.status === 'Closed' ? 'selected' : ''}>${t('closed')}</option></select>
      <label>${t('locationOnSite')}</label><input type="text" id="ef-location" value="${ef.location || ''}"/>
      <label>${t('description')}</label><textarea id="ef-description">${ef.description || ''}</textarea>
      <label>${t('actionTaken')}</label><textarea id="ef-action_taken">${ef.action_taken || ''}</textarea>
      <hr class="divider"/>
      <label>${t('adminPassword')} *</label><input type="password" id="edit-admin-pw" placeholder="Required to save" value="${state.adminPw}"/>
      <button class="btn btn-primary" onclick="doSaveEdit()" ${state.savingEdit ? 'disabled' : ''}>${state.savingEdit ? `<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> ${t('saving')}` : t('saveChanges')}</button>
    </div>
  </div>${state.toast ? `<div class="toast">${state.toast}</div>` : ''}`;
}

function statusBadge(s) { const m = { 'Open': 'badge-open', 'In Progress': 'badge-progress', 'Closed': 'badge-closed' }; return `<span class="badge ${m[s] || 'badge-open'}">${translateStatus(s)}</span>`; }
function severityBadge(s) { const m = { 'Low': 'badge-low', 'Medium': 'badge-medium', 'High': 'badge-high', 'Critical': 'badge-critical' }; return `<span class="badge ${m[s] || 'badge-medium'}">${translateSeverity(s)}</span>`; }

function attachEvents() {
  ['project', 'reportedBy', 'date', 'violationType', 'othersText', 'severity', 'location', 'description', 'actionTaken'].forEach(f => {
    const el = document.getElementById(`f-${f}`);
    if (el) el.addEventListener('change', () => { state.form[f] = el.value; if (f === 'violationType') render(); });
    if (el && f === 'othersText') el.addEventListener('input', () => { state.form[f] = el.value; });
  });
  const np = document.getElementById('new-project-input'); if (np) np.addEventListener('input', () => { state.newProjectName = np.value; });
}

function attachDetailEvents() {
  ['admin-pw', 'admin-pw-del', 'edit-admin-pw'].forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener('input', () => { state.adminPw = el.value; }); });
  ['project', 'reported_by', 'date', 'violation_type', 'severity', 'status', 'location', 'description', 'action_taken'].forEach(f => { const el = document.getElementById(`ef-${f}`); if (el) { el.addEventListener('change', () => { state.editForm[f] = el.value; }); el.addEventListener('input', () => { state.editForm[f] = el.value; }); } });
  const ep = document.getElementById('edit-project-input'); if (ep) ep.addEventListener('input', () => { state.editingProjectName = ep.value; });
  const epw = document.getElementById('edit-project-pw'); if (epw) epw.addEventListener('input', () => { state.adminPw = epw.value; });
  const dpw = document.getElementById('delete-project-pw'); if (dpw) dpw.addEventListener('input', () => { state.adminPw = dpw.value; });
}

function handlePhoto(type, input) { if (input.files[0]) handlePhotoSelect(type + 'Photo', input.files[0]); }
function handleDetailAfterPhoto(input) { if (input.files[0]) uploadAfterPhotoToViolation(state.selectedViolation, input.files[0]); }
function doDeleteAfterPhoto() { state.adminPw = document.getElementById('admin-pw')?.value || state.adminPw; deleteAfterPhoto(state.selectedViolation); }
function doDeleteViolation() { state.adminPw = document.getElementById('admin-pw-del')?.value || state.adminPw; deleteViolation(); }
function doSaveEdit() { state.adminPw = document.getElementById('edit-admin-pw')?.value || state.adminPw; saveEdit(); }
function startEdit() { state.editForm = { ...state.selectedViolation }; state.editMode = true; state.adminPw = ''; render(); }
function startEditProject(name) { state.editingProject = name; state.editingProjectName = name; state.adminPw = ''; render(); }
function startDeleteProject(name) { state.deleteProjectConfirm = true; state.deleteProjectName = name; state.adminPw = ''; render(); }
function doSaveEditProject() { state.adminPw = document.getElementById('edit-project-pw')?.value || state.adminPw; state.editingProjectName = document.getElementById('edit-project-input')?.value || state.editingProjectName; saveEditProject(); }
function doConfirmDeleteProject() { state.adminPw = document.getElementById('delete-project-pw')?.value || state.adminPw; confirmDeleteProject(); }

function goToProject(project) {
  state.projectFilter = project;
  state.filter = 'all';
  state.tab = 'violations';
  localStorage.setItem('svt_lastProject', project);
  render();
}

function doLogout() {
  if (confirm(state.lang === 'zh' ? '确定要退出登录吗？' : 'Are you sure you want to logout?')) {
    const token = getAuthToken();
    if (token) supabaseSignOut(token).catch(() => {});
    clearSession();
    window.location.href = 'login.html';
  }
}

function toggleLang() {
  state.lang = state.lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('svt_lang', state.lang);
  render();
}

function setTab(tab) {
  state.tab = tab;
  if (tab === 'violations' || tab === 'dashboard') loadViolations();
  else render();
}

function setFilter(f) { state.filter = f; render(); }

function selectViolation(id) {
  state.selectedViolation = state.violations.find(v => v.id === id);
  state.editMode = false; state.deleteViolationConfirm = false; state.deleteConfirm = false; state.adminPw = '';
  render();
}

function addProject() {
  const name = document.getElementById('new-project-input')?.value || state.newProjectName;
  if (name.trim()) { state.projects.push(name.trim()); state.newProjectName = ''; state.showAddProject = false; saveAppState(); render(); }
}

// Init — check auth then load
const initUser = getCurrentUser();
if (!initUser) {
  window.location.href = 'login.html';
} else {
  render();
  loadViolations();
}
</script>
</body>
</html>
